version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-activity-tracker
    ports:
      - "3500:3500"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3500
    volumes:
      - ./data:/app/data # Mount a volume for persistent data
    networks:
      - nginx_default

networks:
  nginx_default:
    external: true